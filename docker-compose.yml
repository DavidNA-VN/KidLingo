services:
  postgres:
    image: postgres:16
    container_name: doodle-english-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-doodle_english}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-NAMANHh_0212}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-doodle_english}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: doodle-english-backend
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-NAMANHh_0212}@postgres:5432/${POSTGRES_DB:-doodle_english}
      JWT_SECRET: ${JWT_SECRET:-change-me-local-secret}
      AI_SERVICE_URL: http://ai-service:8001
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy

  ai-service:
    build:
      context: ./ai-service
    container_name: doodle-english-ai-service
    ports:
      - "${AI_SERVICE_PORT:-8001}:8001"

  frontend:
    build:
      context: ./frontend
    container_name: doodle-english-frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
